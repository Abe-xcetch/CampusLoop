name: CampusLoop Monorepo CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Job 1: Lint and test frontend Next.js + Shared packages
  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8.15.4

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Check TypeScript Compilation (Shared & Web)
        run: |
          pnpm --filter @campusloop/shared build
          pnpm --filter @campusloop/ui build
          pnpm --filter web build

      - name: Lint Codebases
        run: pnpm lint:all

  # Job 2: Lint and test Python Django REST Framework backend
  backend-check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: campusloop_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/backend/requirements.txt

      - name: Run Django Tests
        env:
          DJANGO_SECRET_KEY: test-secret-key-for-ci
          DATABASE_URL: postgres://postgres:password@localhost:5432/campusloop_test
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/0
        run: |
          pytest apps/backend/

  # Job 3: Build Docker containers to verify images compile correctly
  docker-check:
    runs-on: ubuntu-latest
    needs: [frontend-check, backend-check]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify Backend Image Build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.backend
          push: false

      - name: Verify Web Image Build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.web
          push: false
